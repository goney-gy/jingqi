<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌸 经期追踪</title>
    <style>
        /* ===== 全局样式 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #fff5f7 0%, #ffe6f0 100%);
            min-height: 100vh;
            color: #333;
            padding: 16px;
            padding-bottom: 80px;
        }

        .page {
            display: none;
            max-width: 480px;
            margin: 0 auto;
            animation: fadeIn 0.3s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== 登录/注册 ===== */
        .login-container {
            text-align: center;
            padding: 40px 20px;
            margin-top: 40px;
        }

        .login-container .logo {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .login-container h1 {
            font-size: 28px;
            color: #d63384;
            margin-bottom: 8px;
        }

        .login-container .subtitle {
            color: #999;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #f0d0d8;
            border-radius: 12px;
            font-size: 16px;
            background: white;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #ff69b4;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff69b4, #d63384);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .toggle-auth {
            margin-top: 20px;
            color: #999;
        }

        .toggle-auth a {
            color: #d63384;
            text-decoration: none;
            font-weight: 600;
        }

        /* ===== 主页面 ===== */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            margin-bottom: 16px;
        }

        .app-header h2 {
            font-size: 20px;
            color: #d63384;
        }

        .btn-logout {
            padding: 8px 16px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
        }

        /* ===== 统计 ===== */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            background: white;
            padding: 16px;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            display: block;
            font-size: 12px;
            color: #999;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #d63384;
        }

        .stat-unit {
            font-size: 12px;
            color: #999;
            margin-left: 2px;
        }

        /* ===== 日历 ===== */
        .calendar-container {
            background: white;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .month-year {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .nav-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: #f5f5f5;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .nav-btn:active {
            background: #e0e0e0;
        }

        .calendar-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            user-select: none;
        }

        .calendar-day:active {
            transform: scale(0.9);
        }

        .calendar-day.other-month {
            color: #ddd;
        }

        .calendar-day.today {
            border: 2px solid #ff69b4;
            font-weight: 700;
        }

        .calendar-day.period-day {
            background: #ffb3c6;
            color: #d63384;
            font-weight: 600;
        }

        .calendar-day.period-day.today {
            border-color: #d63384;
        }

        .calendar-day.period-day:hover {
            background: #ff8fab;
        }

        .calendar-day.has-note::after {
            content: '';
            position: absolute;
            bottom: 4px;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #ff69b4;
        }

        .calendar-day.predicted-day {
            border: 2px solid #4CAF50;
            color: #2E7D32;
            font-weight: 600;
        }

        .calendar-day.predicted-day.period-day {
            border-color: #4CAF50;
            background: linear-gradient(135deg, #ffb3c6 50%, #a5d6a7 50%);
        }

        .calendar-day.predicted-day.today {
            border-color: #4CAF50;
            box-shadow: 0 0 0 2px #ff69b4, 0 0 0 4px #4CAF50;
        }

        /* ===== 备注 ===== */
        .note-container {
            background: white;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }

        .note-container h3 {
            font-size: 16px;
            color: #333;
            margin-bottom: 12px;
        }

        .note-input-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #f0d0d8;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            min-height: 80px;
            transition: border-color 0.3s;
        }

        .note-input-group textarea:focus {
            outline: none;
            border-color: #ff69b4;
        }

        .note-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .note-actions button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .note-actions button:active {
            transform: scale(0.97);
        }

        .btn-period {
            background: #ffb3c6;
            color: #d63384;
        }

        .btn-period.active {
            background: #d63384;
            color: white;
        }

        .btn-save {
            background: #ff69b4;
            color: white;
        }

        .btn-delete {
            background: #ff6b6b;
            color: white;
        }

        .btn-delete:active {
            transform: scale(0.97);
        }

        .note-status {
            margin-top: 8px;
            font-size: 13px;
            color: #28a745;
            min-height: 20px;
        }

        .note-status.error {
            color: #dc3545;
        }

        /* ===== 历史记录 ===== */
        .history-container {
            background: white;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .history-container h3 {
            font-size: 16px;
            color: #333;
            margin-bottom: 12px;
        }

        #periodHistory {
            max-height: 300px;
            overflow-y: auto;
        }

        .period-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f5f5f5;
        }

        .period-item:last-child {
            border-bottom: none;
        }

        .period-item .period-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .period-item .date {
            font-weight: 500;
            font-size: 15px;
        }

        .period-item .info {
            color: #999;
            font-size: 12px;
        }

        .btn-delete-record {
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 44px;
            min-height: 36px;
        }

        .btn-delete-record:active {
            transform: scale(0.9);
            background: #e05555;
        }

        /* ===== 弹窗 ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 32px 24px;
            max-width: 340px;
            width: 90%;
            text-align: center;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-content p {
            font-size: 17px;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
        }

        .modal-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-cancel {
            background: #f5f5f5;
            color: #666;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 400px) {
            body {
                padding: 12px;
                padding-bottom: 60px;
            }
            
            .stats-container {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
                padding: 12px;
            }
            
            .stat-value {
                font-size: 17px;
            }
            
            .calendar-day {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <!-- ============================================================ -->
    <!-- 登录页面 -->
    <!-- ============================================================ -->
    <div id="loginPage" class="page active">
        <div class="login-container">
            <div class="logo">🌸</div>
            <h1>经期追踪</h1>
            <p class="subtitle">关爱自己，从记录开始</p>
            <form id="loginForm">
                <div class="form-group">
                    <input type="text" id="loginUsername" placeholder="用户名" required>
                </div>
                <div class="form-group">
                    <input type="password" id="loginPassword" placeholder="密码" required>
                </div>
                <button type="submit" class="btn-primary">登录</button>
            </form>
            <p class="toggle-auth">
                还没有账号？<a href="#" id="showRegister">立即注册</a>
            </p>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- 注册页面 -->
    <!-- ============================================================ -->
    <div id="registerPage" class="page">
        <div class="login-container">
            <div class="logo">🌸</div>
            <h1>创建账号</h1>
            <form id="registerForm">
                <div class="form-group">
                    <input type="text" id="registerUsername" placeholder="用户名" required>
                </div>
                <div class="form-group">
                    <input type="email" id="registerEmail" placeholder="邮箱（可选）">
                </div>
                <div class="form-group">
                    <input type="password" id="registerPassword" placeholder="密码" required>
                </div>
                <div class="form-group">
                    <input type="password" id="registerConfirmPassword" placeholder="确认密码" required>
                </div>
                <button type="submit" class="btn-primary">注册</button>
            </form>
            <p class="toggle-auth">
                已有账号？<a href="#" id="showLogin">返回登录</a>
            </p>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- 主应用页面 -->
    <!-- ============================================================ -->
    <div id="appPage" class="page">
        <div class="app-header">
            <h2>🌸 经期追踪</h2>
            <button id="logoutBtn" class="btn-logout">退出</button>
        </div>
        
        <!-- 统计概览 -->
        <div class="stats-container">
            <div class="stat-item">
                <span class="stat-label">周期</span>
                <span class="stat-value" id="cycleLength">--</span>
                <span class="stat-unit">天</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">经期</span>
                <span class="stat-value" id="periodLength">--</span>
                <span class="stat-unit">天</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">下次预计</span>
                <span class="stat-value" id="nextPeriod">--</span>
            </div>
        </div>

        <!-- 日历 -->
        <div class="calendar-container">
            <div class="calendar-header">
                <button id="prevMonth" class="nav-btn">‹</button>
                <span id="currentMonthYear" class="month-year"></span>
                <button id="nextMonth" class="nav-btn">›</button>
            </div>
            <div class="calendar-weekdays">
                <span>日</span><span>一</span><span>二</span>
                <span>三</span><span>四</span><span>五</span><span>六</span>
            </div>
            <div id="calendarGrid" class="calendar-grid"></div>
        </div>

        <!-- 今日备注 -->
        <div class="note-container">
            <h3>📝 今日备注</h3>
            <div class="note-input-group">
                <textarea id="dailyNote" placeholder="记录今日状态（症状、情绪等）..." rows="3"></textarea>
                <div class="note-actions">
                    <button id="markPeriod" class="btn-period">💖 标记经期</button>
                    <button id="saveNote" class="btn-save">保存</button>
                    <button id="deleteNote" class="btn-delete">🗑️ 删除备注</button>
                </div>
            </div>
            <div id="noteStatus" class="note-status"></div>
        </div>

        <!-- 经期记录列表 -->
        <div class="history-container">
            <h3>📊 经期记录 <span style="font-size:12px;color:#999;font-weight:400;">（点击右侧🗑️删除）</span></h3>
            <div id="periodHistory"></div>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- 提示弹窗 -->
    <!-- ============================================================ -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <p id="modalMessage"></p>
            <div class="modal-actions">
                <button id="modalCancel" class="btn-cancel">取消</button>
                <button id="modalConfirm" class="btn-primary">确认</button>
            </div>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- 引入 Supabase JS SDK -->
    <!-- ============================================================ -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>

    <!-- ============================================================ -->
    <!-- JavaScript 核心代码 -->
    <!-- ============================================================ -->
    <script>
        // =============================================================
        // 1. Supabase 配置（直接硬编码）
        // =============================================================
        
        const SUPABASE_URL = 'https://bedgflxpiaiskeqkwnxo.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJlZGdmbHhwaWFpc2tlcWt3bnhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MDExNjUsImV4cCI6MjA5ODM3NzE2NX0.ek39USIDE0F_9FDpeuL6l7h4NaVj8D1lbtUqiMe75yQ';

        console.log('🔑 Supabase已配置');

        // =============================================================
        // 2. 初始化 Supabase 客户端
        // =============================================================
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // =============================================================
        // 3. 工具函数
        // =============================================================
        
        function formatDate(year, month, day) {
            return `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        }

        function formatDateFromDate(date) {
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        }

        function displayDate(dateStr) {
            const parts = dateStr.split('-');
            return `${parts[0]}年${parseInt(parts[1])}月${parseInt(parts[2])}日`;
        }

        function getTodayStr() {
            const today = new Date();
            return formatDate(today.getFullYear(), today.getMonth(), today.getDate());
        }

        // =============================================================
        // 4. 状态管理
        // =============================================================
        
        let state = {
            currentMonth: new Date().getMonth(),
            currentYear: new Date().getFullYear(),
            userId: null,
            periods: [],
            dailyNotes: {},
            selectedDate: new Date()
        };

        // =============================================================
        // 5. DOM引用
        // =============================================================
        
        const $ = id => document.getElementById(id);
        const pages = {
            login: $('loginPage'),
            register: $('registerPage'),
            app: $('appPage')
        };

        // =============================================================
        // 6. 认证
        // =============================================================
        
        async function login(username, password) {
            try {
                // 查询用户
                const { data: users, error } = await supabase
                    .from('user_data')
                    .select('*')
                    .eq('username', username);

                if (error) throw new Error(error.message);
                if (!users || users.length === 0) {
                    alert('用户名或密码错误');
                    return false;
                }

                const user = users[0];
                
                // 简单密码验证（生产环境应使用bcrypt）
                if (user.password_hash !== password) {
                    alert('用户名或密码错误');
                    return false;
                }

                state.userId = user.id;
                localStorage.setItem('userId', user.id);
                
                await loadData();
                showPage('app');
                renderCalendar();
                return true;
            } catch (error) {
                alert('登录失败: ' + error.message);
                return false;
            }
        }

        async function register(username, password, email) {
            try {
                // 检查用户名是否存在
                const { data: existing, error: checkError } = await supabase
                    .from('user_data')
                    .select('id')
                    .eq('username', username);

                if (checkError) throw new Error(checkError.message);
                if (existing && existing.length > 0) {
                    alert('用户名已存在');
                    return false;
                }

                // 创建用户
                const { data: newUser, error: insertError } = await supabase
                    .from('user_data')
                    .insert({
                        username: username,
                        password_hash: password,
                        email: email || null,
                        menstrual_history: [],
                        daily_notes: {},
                        settings: {
                            default_cycle_length: 28,
                            default_period_length: 5,
                            remind_days_before: 3
                        }
                    })
                    .select();

                if (insertError) throw new Error(insertError.message);

                alert('注册成功！请登录');
                showPage('login');
                return true;
            } catch (error) {
                alert('注册失败: ' + error.message);
                return false;
            }
        }

        function logout() {
            state.userId = null;
            localStorage.removeItem('userId');
            showPage('login');
        }

        // =============================================================
        // 7. 数据加载
        // =============================================================
        
        async function loadData() {
            if (!state.userId) return;

            try {
                // 获取用户数据
                const { data: userData, error } = await supabase
                    .from('user_data')
                    .select('*')
                    .eq('id', state.userId)
                    .single();

                if (error) throw new Error(error.message);
                if (!userData) return;

                state.periods = userData.menstrual_history || [];
                state.dailyNotes = userData.daily_notes || {};

                updateStats();
                renderHistory();

                return true;
            } catch (error) {
                console.error('加载数据失败:', error);
                return false;
            }
        }

        // =============================================================
        // 8. 保存数据到Supabase
        // =============================================================
        
        async function saveUserData() {
            if (!state.userId) return;

            try {
                const { error } = await supabase
                    .from('user_data')
                    .update({
                        menstrual_history: state.periods,
                        daily_notes: state.dailyNotes,
                        updated_at: new Date().toISOString()
                    })
                    .eq('id', state.userId);

                if (error) throw new Error(error.message);
                return true;
            } catch (error) {
                console.error('保存数据失败:', error);
                return false;
            }
        }

        // =============================================================
        // 9. 渲染日历
        // =============================================================
        
        async function renderCalendar() {
            const year = state.currentYear;
            const month = state.currentMonth;
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrevMonth = new Date(year, month, 0).getDate();
            const todayStr = getTodayStr();
            
            $('currentMonthYear').textContent = `${year}年${month + 1}月`;
            
            const periodDates = new Set();
            state.periods.forEach(record => {
                const start = new Date(record.start_date);
                const duration = record.period_length || 5;
                for (let i = 0; i < duration; i++) {
                    const d = new Date(start);
                    d.setDate(d.getDate() + i);
                    const key = formatDate(d.getFullYear(), d.getMonth(), d.getDate());
                    if (key.startsWith(`${year}-${String(month+1).padStart(2,'0')}`)) {
                        periodDates.add(key);
                    }
                }
            });
            
            // 计算预测日期
            let predictedDates = new Set();
            if (state.periods.length > 0) {
                const last = state.periods[0];
                const cycleLength = last.cycle_length || 28;
                const lastStart = new Date(last.start_date);
                const nextStart = new Date(lastStart);
                nextStart.setDate(nextStart.getDate() + cycleLength);
                const nextStr = formatDate(nextStart.getFullYear(), nextStart.getMonth(), nextStart.getDate());
                if (nextStr.startsWith(`${year}-${String(month+1).padStart(2,'0')}`)) {
                    predictedDates.add(nextStr);
                }
            }
            
            let html = '';
            const totalDays = firstDay + daysInMonth;
            const totalSlots = Math.ceil(totalDays / 7) * 7;
            
            for (let i = 0; i < totalSlots; i++) {
                let day;
                let isOtherMonth = false;
                
                if (i < firstDay) {
                    day = daysInPrevMonth - firstDay + i + 1;
                    isOtherMonth = true;
                } else if (i >= firstDay + daysInMonth) {
                    day = i - firstDay - daysInMonth + 1;
                    isOtherMonth = true;
                } else {
                    day = i - firstDay + 1;
                }
                
                const dateStr = formatDate(year, month, day);
                const isToday = dateStr === todayStr;
                const isPeriod = periodDates.has(dateStr);
                const isPredicted = predictedDates.has(dateStr);
                const hasNote = state.dailyNotes[dateStr];
                
                let classes = 'calendar-day';
                if (isOtherMonth) classes += ' other-month';
                if (isToday) classes += ' today';
                if (isPeriod) classes += ' period-day';
                if (isPredicted) classes += ' predicted-day';
                if (hasNote && hasNote.note) classes += ' has-note';
                
                html += `<div class="${classes}" data-date="${dateStr}">${day}</div>`;
            }
            
            $('calendarGrid').innerHTML = html;
            
            document.querySelectorAll('.calendar-day:not(.other-month)').forEach(el => {
                el.addEventListener('click', () => {
                    const date = el.dataset.date;
                    const parts = date.split('-');
                    state.selectedDate = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
                    showDayNote(date);
                });
            });
        }

        // =============================================================
        // 10. 显示日期备注
        // =============================================================
        
        function showDayNote(dateStr) {
            const note = state.dailyNotes[dateStr] || {};
            $('dailyNote').value = note.note || '';
            
            const markBtn = $('markPeriod');
            if (note.has_period) {
                markBtn.classList.add('active');
                markBtn.textContent = '💖 取消标记';
            } else {
                markBtn.classList.remove('active');
                markBtn.textContent = '💖 标记经期';
            }
            
            const parts = dateStr.split('-');
            const dateDisplay = `${parts[0]}年${parseInt(parts[1])}月${parseInt(parts[2])}日`;
            $('noteStatus').textContent = `📅 ${dateDisplay}`;
        }

        // =============================================================
        // 11. 保存备注
        // =============================================================
        
        async function saveDailyNote() {
            const date = formatDateFromDate(state.selectedDate);
            const noteText = $('dailyNote').value.trim();
            const hasPeriod = $('markPeriod').classList.contains('active');
            
            if (!noteText && !hasPeriod) {
                const existingNote = state.dailyNotes[date];
                if (existingNote && existingNote.note) {
                    if (confirm('确定要删除今天的备注吗？')) {
                        delete state.dailyNotes[date];
                        await saveUserData();
                        renderCalendar();
                        $('noteStatus').textContent = '🗑️ 备注已删除！';
                        setTimeout(() => $('noteStatus').textContent = '', 2000);
                        return;
                    }
                }
                return;
            }
            
            try {
                if (!state.dailyNotes[date]) {
                    state.dailyNotes[date] = {};
                }
                state.dailyNotes[date].note = noteText;
                state.dailyNotes[date].has_period = hasPeriod;
                state.dailyNotes[date].updated_at = new Date().toISOString();
                
                await saveUserData();
                
                $('noteStatus').textContent = '✅ 保存成功！';
                renderCalendar();
                updateStats();
                
                setTimeout(() => {
                    $('noteStatus').textContent = '';
                }, 2000);
                
            } catch (error) {
                alert('保存失败: ' + error.message);
            }
        }

        // =============================================================
        // 12. 标记经期
        // =============================================================
        
        async function markPeriod() {
            const date = formatDateFromDate(state.selectedDate);
            const markBtn = $('markPeriod');
            const isActive = markBtn.classList.contains('active');
            
            if (!isActive) {
                const modal = $('modal');
                const dateDisplay = displayDate(date);
                $('modalMessage').textContent = `🌸 是否将 ${dateDisplay} 标记为经期开始日？`;
                modal.classList.add('show');
                
                $('modalConfirm').onclick = async () => {
                    modal.classList.remove('show');
                    try {
                        // 检查是否已有该日期的记录
                        const existingIdx = state.periods.findIndex(r => r.start_date === date);
                        
                        const record = {
                            start_date: date,
                            cycle_length: 28,
                            period_length: 5,
                            created_at: new Date().toISOString()
                        };
                        
                        if (existingIdx >= 0) {
                            state.periods[existingIdx] = record;
                        } else {
                            state.periods.unshift(record);
                        }
                        
                        // 同时更新备注
                        if (!state.dailyNotes[date]) {
                            state.dailyNotes[date] = {};
                        }
                        state.dailyNotes[date].has_period = true;
                        
                        await saveUserData();
                        await loadData();
                        renderCalendar();
                        updateStats();
                        $('noteStatus').textContent = '✅ 经期标记成功！';
                        setTimeout(() => $('noteStatus').textContent = '', 2000);
                    } catch (error) {
                        alert('标记失败: ' + error.message);
                    }
                };
                
                $('modalCancel').onclick = () => {
                    modal.classList.remove('show');
                };
            } else {
                const dateDisplay = displayDate(date);
                if (confirm(`确定要取消 ${dateDisplay} 的经期标记吗？`)) {
                    try {
                        // 从经期记录中删除
                        state.periods = state.periods.filter(r => r.start_date !== date);
                        
                        // 更新备注
                        if (state.dailyNotes[date]) {
                            state.dailyNotes[date].has_period = false;
                        }
                        
                        await saveUserData();
                        await loadData();
                        renderCalendar();
                        updateStats();
                        
                        markBtn.classList.remove('active');
                        markBtn.textContent = '💖 标记经期';
                        
                        $('noteStatus').textContent = '✅ 经期标记已取消！';
                        setTimeout(() => $('noteStatus').textContent = '', 2000);
                    } catch (error) {
                        alert('取消标记失败: ' + error.message);
                    }
                }
            }
        }

        // =============================================================
        // 13. 更新统计
        // =============================================================
        
        function updateStats() {
            if (state.periods.length === 0) {
                $('cycleLength').textContent = '--';
                $('periodLength').textContent = '--';
                $('nextPeriod').textContent = '--';
                return;
            }
            
            const last = state.periods[0];
            const cycleLength = last.cycle_length || 28;
            const periodLength = last.period_length || 5;
            
            $('cycleLength').textContent = cycleLength;
            $('periodLength').textContent = periodLength;
            
            const lastStart = new Date(last.start_date);
            const nextStart = new Date(lastStart);
            nextStart.setDate(nextStart.getDate() + cycleLength);
            $('nextPeriod').textContent = nextStart.toLocaleDateString('zh-CN');
        }

        // =============================================================
        // 14. 渲染历史记录
        // =============================================================
        
        function renderHistory() {
            const container = $('periodHistory');
            if (state.periods.length === 0) {
                container.innerHTML = '<p style="color:#999;text-align:center;padding:20px;">暂无记录</p>';
                return;
            }
            
            let html = '';
            state.periods.slice(0, 20).forEach((record) => {
                const date = new Date(record.start_date).toLocaleDateString('zh-CN');
                const startDate = record.start_date;
                html += `
                    <div class="period-item" data-start-date="${startDate}">
                        <div class="period-info">
                            <span class="date">${date}</span>
                            <span class="info">周期 ${record.cycle_length}天 · 经期 ${record.period_length}天</span>
                        </div>
                        <button class="btn-delete-record" data-start-date="${startDate}">🗑️</button>
                    </div>
                `;
            });
            container.innerHTML = html;
            
            document.querySelectorAll('.btn-delete-record').forEach(btn => {
                btn.addEventListener('click', async function(e) {
                    e.stopPropagation();
                    const startDate = this.dataset.startDate;
                    const dateDisplay = new Date(startDate).toLocaleDateString('zh-CN');
                    
                    if (confirm(`确定要删除 ${dateDisplay} 的经期记录吗？`)) {
                        await deletePeriodRecord(startDate);
                    }
                });
            });
        }

        // =============================================================
        // 15. 删除经期记录
        // =============================================================
        
        async function deletePeriodRecord(startDate) {
            try {
                console.log(`正在删除经期记录: ${startDate}`);
                
                state.periods = state.periods.filter(r => r.start_date !== startDate);
                
                if (state.dailyNotes[startDate]) {
                    state.dailyNotes[startDate].has_period = false;
                }
                
                await saveUserData();
                await loadData();
                renderCalendar();
                updateStats();
                renderHistory();
                
                const currentDateStr = formatDateFromDate(state.selectedDate);
                if (currentDateStr === startDate) {
                    const markBtn = $('markPeriod');
                    markBtn.classList.remove('active');
                    markBtn.textContent = '💖 标记经期';
                    $('dailyNote').value = '';
                }
                
                $('noteStatus').textContent = '✅ 经期记录已删除！';
                setTimeout(() => $('noteStatus').textContent = '', 2000);
                
            } catch (error) {
                console.error('删除经期记录失败:', error);
                alert('删除失败: ' + error.message);
            }
        }

        // =============================================================
        // 16. 页面切换
        // =============================================================
        
        function showPage(page) {
            Object.keys(pages).forEach(key => {
                pages[key].classList.toggle('active', key === page);
            });
        }

        // =============================================================
        // 17. 事件绑定
        // =============================================================
        
        $('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = $('loginUsername').value.trim();
            const password = $('loginPassword').value.trim();
            await login(username, password);
        });

        $('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = $('registerUsername').value.trim();
            const email = $('registerEmail').value.trim();
            const password = $('registerPassword').value;
            const confirm = $('registerConfirmPassword').value;
            
            if (password !== confirm) {
                alert('两次输入的密码不一致');
                return;
            }
            if (password.length < 6) {
                alert('密码长度至少6位');
                return;
            }
            await register(username, password, email);
        });

        $('showRegister').addEventListener('click', (e) => {
            e.preventDefault();
            showPage('register');
        });

        $('showLogin').addEventListener('click', (e) => {
            e.preventDefault();
            showPage('login');
        });

        $('logoutBtn').addEventListener('click', logout);

        $('prevMonth').addEventListener('click', () => {
            state.currentMonth--;
            if (state.currentMonth < 0) {
                state.currentMonth = 11;
                state.currentYear--;
            }
            renderCalendar();
        });

        $('nextMonth').addEventListener('click', () => {
            state.currentMonth++;
            if (state.currentMonth > 11) {
                state.currentMonth = 0;
                state.currentYear++;
            }
            renderCalendar();
        });

        $('saveNote').addEventListener('click', saveDailyNote);
        $('markPeriod').addEventListener('click', markPeriod);

        $('deleteNote').addEventListener('click', async () => {
            const date = formatDateFromDate(state.selectedDate);
            const existingNote = state.dailyNotes[date];
            if (!existingNote || !existingNote.note) {
                alert('该日期没有备注需要删除');
                return;
            }
            
            if (confirm(`确定要删除 ${displayDate(date)} 的备注吗？`)) {
                try {
                    delete state.dailyNotes[date];
                    await saveUserData();
                    $('dailyNote').value = '';
                    renderCalendar();
                    $('noteStatus').textContent = '🗑️ 备注已删除！';
                    setTimeout(() => $('noteStatus').textContent = '', 2000);
                } catch (error) {
                    alert('删除失败: ' + error.message);
                }
            }
        });

        // =============================================================
        // 18. 初始化
        // =============================================================
        
        async function init() {
            const userId = localStorage.getItem('userId');
            
            if (userId) {
                state.userId = userId;
                try {
                    await loadData();
                    showPage('app');
                    renderCalendar();
                    return;
                } catch (error) {
                    console.error('自动登录失败:', error);
                    localStorage.removeItem('userId');
                }
            }
            
            showPage('login');
        }

        init();
    </script>

</body>
</html>
